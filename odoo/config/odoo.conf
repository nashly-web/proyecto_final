[options]
; odoo.conf - Config basica para Odoo 17 en Docker
;
; Puntos clave:
; - db_*: conexion a Postgres (servicio "db" del compose)
; - addons_path: ruta de addons oficiales + ruta de nuestros addons (montados en /mnt/extra-addons)
; - admin_passwd: password maestro de Odoo (para operaciones de admin dentro de Odoo)
; - http_*: donde escucha Odoo (puerto 8069 expuesto por docker-compose)
;
; Nota: comentarios ASCII (sin tildes/emojis) para evitar texto raro.
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
admin_passwd = 2408
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo
db_name = sosemergelens
http_port = 8069
http_interface = 0.0.0.0
log_level = info
workers = 0
